<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="810" viewBox="0 0 1440 810">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080b14"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>
  <rect width="1440" height="810" rx="26" fill="url(#bg2)"/>
  <text x="720" y="70" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI,Arial" font-size="36" font-weight="700">Agreement API Workflow</text>
  <text x="720" y="106" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial" font-size="17">From identity enrollment to immutable history</text>

  <g filter="url(#shadow2)" font-family="Segoe UI,Arial">
    <rect x="90" y="175" width="380" height="245" rx="22" fill="#121827" stroke="#334155"/>
    <circle cx="130" cy="217" r="9" fill="#ef4444"/>
    <circle cx="158" cy="217" r="9" fill="#f59e0b"/>
    <circle cx="186" cy="217" r="9" fill="#22c55e"/>
    <text x="225" y="223" fill="#94a3b8" font-size="15">enrollment</text>
    <text x="122" y="276" fill="#c4b5fd" font-size="17" font-weight="700">POST /users</text>
    <text x="122" y="319" fill="#e2e8f0" font-size="16">username: student-01</text>
    <text x="122" y="353" fill="#e2e8f0" font-size="16">orgName: org2</text>
    <rect x="122" y="377" width="312" height="24" rx="8" fill="#052e16"/>
    <text x="138" y="394" fill="#86efac" font-size="13">✓ Identity enrolled and token issued</text>

    <rect x="530" y="175" width="380" height="245" rx="22" fill="#121827" stroke="#334155"/>
    <circle cx="570" cy="217" r="9" fill="#ef4444"/>
    <circle cx="598" cy="217" r="9" fill="#f59e0b"/>
    <circle cx="626" cy="217" r="9" fill="#22c55e"/>
    <text x="665" y="223" fill="#94a3b8" font-size="15">agreement</text>
    <text x="562" y="276" fill="#c4b5fd" font-size="17" font-weight="700">POST /channels/.../studentuniversity</text>
    <text x="562" y="319" fill="#e2e8f0" font-size="16">student: Ada Lovelace</text>
    <text x="562" y="353" fill="#e2e8f0" font-size="16">amount: 25000</text>
    <rect x="562" y="377" width="312" height="24" rx="8" fill="#052e16"/>
    <text x="578" y="394" fill="#86efac" font-size="13">✓ Transaction committed to channel1</text>

    <rect x="970" y="175" width="380" height="245" rx="22" fill="#121827" stroke="#334155"/>
    <circle cx="1010" cy="217" r="9" fill="#ef4444"/>
    <circle cx="1038" cy="217" r="9" fill="#f59e0b"/>
    <circle cx="1066" cy="217" r="9" fill="#22c55e"/>
    <text x="1105" y="223" fill="#94a3b8" font-size="15">query</text>
    <text x="1002" y="276" fill="#c4b5fd" font-size="17" font-weight="700">GET /channels/.../studentuniversity</text>
    <text x="1002" y="319" fill="#e2e8f0" font-size="16">fcn: queryByStudentEmail</text>
    <text x="1002" y="353" fill="#e2e8f0" font-size="16">args: ["ada@example.com"]</text>
    <rect x="1002" y="377" width="312" height="24" rx="8" fill="#052e16"/>
    <text x="1018" y="394" fill="#86efac" font-size="13">✓ Agreement returned from CouchDB</text>
  </g>

  <path d="M470 298 H518" stroke="#8b5cf6" stroke-width="4"/>
  <path d="M502 284 L520 298 L502 312" fill="none" stroke="#8b5cf6" stroke-width="4"/>
  <path d="M910 298 H958" stroke="#8b5cf6" stroke-width="4"/>
  <path d="M942 284 L960 298 L942 312" fill="none" stroke="#8b5cf6" stroke-width="4"/>

  <rect x="165" y="505" width="1110" height="180" rx="24" fill="#0f172a" stroke="#312e81"/>
  <text x="720" y="553" text-anchor="middle" fill="#ddd6fe" font-family="Segoe UI,Arial" font-size="21" font-weight="700">What the ledger preserves</text>
  <g font-family="Segoe UI,Arial" font-size="17">
    <circle cx="265" cy="615" r="23" fill="#312e81"/><text x="265" y="621" text-anchor="middle" fill="#fff">1</text>
    <text x="305" y="621" fill="#cbd5e1">Deterministic agreement ID</text>
    <circle cx="600" cy="615" r="23" fill="#312e81"/><text x="600" y="621" text-anchor="middle" fill="#fff">2</text>
    <text x="640" y="621" fill="#cbd5e1">Endorsed transaction</text>
    <circle cx="920" cy="615" r="23" fill="#312e81"/><text x="920" y="621" text-anchor="middle" fill="#fff">3</text>
    <text x="960" y="621" fill="#cbd5e1">Complete update history</text>
  </g>
  <text x="720" y="750" text-anchor="middle" fill="#64748b" font-family="Segoe UI,Arial" font-size="14">Yakusoku means “promise” — each agreement is recorded as one.</text>
</svg>
